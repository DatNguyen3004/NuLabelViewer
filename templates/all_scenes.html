<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuLabel - Dataset Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/all_scenes.css') }}">

    <link rel="apple-touch-icon" sizes="180x180"
        href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32"
        href="{{ url_for('static', filename='favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16"
        href="{{ url_for('static', filename='favicon/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}">
</head>

<body>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-1">Tập dữ liệu <span class="text-success">nuScenes</span></h2>
                <p class="text-muted small">Tổng cộng 404 bộ dữ liệu được trích xuất từ v1.0-mini</p>
            </div>
            <div class="d-flex gap-2">
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4 small">
                    <i class="fa-solid fa-arrow-left me-2"></i>Trang chủ
                </a>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            {% for scene in scenes %}
            <div class="col">
                <div class="card h-100 scene-card shadow-sm">
                    <div class="img-container">
                        <img src="{{ url_for('static', filename='Dataset/v1.0-mini/' + scene[1].replace('\\', '/')) }}"
                            class="scene-img" alt="Front View">
                        <span class="position-absolute top-0 start-0 m-2 badge bg-dark opacity-75">
                            #{{ loop.index }}
                        </span>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <small class="text-muted d-block mb-1">Sample Token:</small>
                        <div class="token-badge text-truncate mb-3" title="{{ scene[0] }}">
                            {{ scene[0] }}
                        </div>

                        <div class="mt-auto">
                            <a href="{{ url_for('analytics', current_token=scene[0]) }}"
                                class="btn btn-inspect w-100 text-decoration-none d-block text-center">
                                <i class="fa-solid fa-magnifying-glass-chart me-2"></i>Kiểm định
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>

</html>
