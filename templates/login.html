<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuLabel Viewer - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            background: #fff;
        }
        .logo-box {
            width: 50px;
            height: 50px;
            background-color: #2e7d32;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 24px;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #adb5bd;
            border-radius: 10px 0 0 10px;
        }
        .form-control {
            background-color: #f8f9fa;
            border-left: none;
            padding: 12px;
            border-radius: 0 10px 10px 0;
            font-size: 0.95rem;
        }
        .form-control:focus {
            background-color: #f8f9fa;
            box-shadow: none;
            border-color: #dee2e6;
        }
        .btn-login {
            background-color: #2e7d32;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #246227;
        }
        .text-link {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .leaf-btn{
        width:80px;
        height:80px;
        background:#d3eadc;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        margin:0 auto 20px;
        }
        
        .leaf-btn i{
            font-size:38px;
            color:#2e7d32;
            transform: translateX(-2px);
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="leaf-btn">
        <i class="fa-solid fa-leaf"></i>
    </div>

    <h3 class="fw-bold mb-1">NuLabel <span class="fw-light text-muted">Viewer</span></h3>
    <p class="text-muted small mb-4">Chào mừng trở lại! Vui lòng nhập thông tin của bạn.</p>

    <form class="text-start">
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                <input type="text" class="form-control" placeholder="Nhập tên đăng nhập">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                <input type="password" class="form-control" placeholder="••••••••">
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label small text-muted" for="remember">
                    Ghi nhớ đăng nhập
                </label>
            </div>
            <a href="#" class="text-link small">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn btn-success btn-login w-100 mb-4">Đăng nhập</button>

        <div class="text-center">
            <p class="text-muted small">Chưa có tài khoản? <a href="#" class="text-link">Liên hệ hỗ trợ</a></p>
        </div>
    </form>
</div>

</body>
</html>
