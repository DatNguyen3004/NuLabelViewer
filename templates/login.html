<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuLabel Viewer - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="login-card text-center">
    <div class="leaf-btn">
        <i class="fa-solid fa-leaf"></i>
    </div>

    <h3 class="fw-bold mb-1">NuLabel <span class="fw-light text-muted">Viewer</span></h3>
    <p class="text-muted small mb-4">Chào mừng trở lại! Vui lòng nhập thông tin của bạn.</p>

    <form class="text-start">
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                <input type="text" class="form-control" placeholder="Nhập tên đăng nhập">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                <input type="password" class="form-control" placeholder="••••••••">
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label small text-muted" for="remember">
                    Ghi nhớ đăng nhập
                </label>
            </div>
            <a href="#" class="text-link small">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn btn-success btn-login w-100 mb-4">Đăng nhập</button>

        <div class="text-center">
            <p class="text-muted small">Chưa có tài khoản? <a href="#" class="text-link">Liên hệ hỗ trợ</a></p>
        </div>
    </form>
</div>

</body>
</html>
