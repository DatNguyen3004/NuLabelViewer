<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuLabel Viewer - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

    <link rel="apple-touch-icon" sizes="180x180"
        href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32"
        href="{{ url_for('static', filename='favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16"
        href="{{ url_for('static', filename='favicon/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}">
</head>

<body>

    <div class="login-card text-center">
        <img src="{{ url_for('static', filename='favicon/android-chrome-192x192.png') }}" class="logo-a-inner"
            alt="NuLabel Logo">

        <h3 class="fw-bold mb-1">NuLabel <span class="fw-light text-muted">Viewer</span></h3>
        <p class="text-muted small mb-4">Chào mừng trở lại! Vui lòng nhập thông tin của bạn.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 small border-0 shadow-sm mb-3" role="alert"
            style="font-size: 0.8rem;">
            <i class="fa-solid fa-circle-exclamation me-2"></i> {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form class="text-start" action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa-regular fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group password-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>

                    <input type="password" name="password" id="password-input" class="form-control" placeholder="••••"
                        required>

                    <span class="input-group-text" id="toggle-password" style="cursor: pointer;">
                        <i class="fa-regular fa-eye" id="eye-icon"></i>
                    </span>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label small text-muted" for="remember">
                        Ghi nhớ đăng nhập
                    </label>
                </div>
                <a href="#" class="text-link small">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-success btn-login w-100 mb-4">Đăng nhập</button>

            <div class="text-center">
                <p class="text-muted small">Chưa có tài khoản? <a href="#" class="text-link">Liên hệ hỗ trợ</a></p>
            </div>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
