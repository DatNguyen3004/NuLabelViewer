<div class="controls">
    <form action="{{ url_for('verify') }}" method="POST">
        <input type="hidden" name="sample_token" value="{{ token }}">
        
        <button type="submit" name="status" value="1" class="btn-approve">Đúng (Approve)</button>
        <button type="submit" name="status" value="2" class="btn-reject">Sai (Reject)</button>
    </form>
</div>
